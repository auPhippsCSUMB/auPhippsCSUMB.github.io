<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-primary-subtle">
    <h1 class="fs-1 fw-bold text-center mt-5"> Sign Up Form </h1>

    <fieldset class="p-4 card position-absolute top-50 start-50 translate-middle w-50">
        <form id="signUpForm" action="welcome.html">
            <legend>Sign Up</legend>
            <br><br>
            <h5>Contact Info</h5>
            <div class="input-group mb-2">
                <input type="text" class="form-control" placeholder="First Name"><br>
            </div>
            <div class="input-group mb-2">
                <input type="text" class="form-control" placeholder="Last Name">
            </div>
            <div class="input-group mb-2">
                <input type="text" class="form-control" placeholder="Email"><br>
            </div>
            <div class="input-group mb-2">
                <input type="text" class="form-control" placeholder="Phone Number">
            </div>
            <br><br>
            <h5>Address Info</h5>

            <div class="input-group mb-2">
                <input type="text" id="zipCode" class="form-control" placeholder="Zip Code">
            </div>
            City: <span id="city"></span>
            <br>
            Latitude: <span id="latitude"></span>
            <br>
            Longitude: <span id="longitude"></span>
            <br>
            <br>
            <div class="input-group mb-2 mt-2">
                <select id="state" class="form-select" placeholder="Select A State"></select>
            </div>
            <div class="input-group mb-2">
                <select id="county" class="form-select" placeholder="Select A County"></select>
            </div>

            <div class="input-group mb-2" id="userNameDiv">
                <input type="text" id="usernameBox" class="form-control" placeholder="Desired Username"> <span id="available"></span>
            </div>
            <div class="input-group mb-2" id="passwordDiv">
                <input type="password" id="passwordBox" class="form-control w-50" placeholder="Password"> <span id="password"></span>
            </div>
            <div class="input-group mb-2" id="passwordAgainDiv">
                <input type="password" id="passwordAgainBox" class="form-control" placeholder="Confirm Password"> <span id="passwordAgain"></span>
            </div>
            <input type="submit" value="Sign up!" class="btn btn-primary">
        </form>
    </fieldset>

    <script src="js/script.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
</body>

</html>
