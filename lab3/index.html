<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3: Quiz</title>
    <script src="https://unpkg.com/underscore@1.13.7/underscore-umd-min.js">
    </script>
    <script src="./js/script.js" defer></script>
    <link href="./style/style.css" rel="stylesheet">

</head>

<body>
    <h1>Epic Gamer Quiz</h1>

    <div class="picDiv">
        <div id="q1Div" class="question">
            <h2>1. What is the most popular hand gesture right now?</h2>
            <br>
            <div id="q1ChoicesDiv"></div>
            <br>
            <br>
        </div>
        <img id="q1DivPic" class="picture">
    </div>
    <div class="picDiv">
        <div id="q2Div" class="question">
            <h2>2. Which Brother is Framemogging here?</h2>
            <br>
            <img src="https://tse2.mm.bing.net/th/id/OIP.RcVmmPYmWgZTfXng8JF76AHaEK?rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="mariobrothers">
            <br>
            <input type="text" name="q2" class="userInput">
            <br>
            <br>
        </div>
        <img id="q2DivPic" class="picture">
    </div>
    <div class="picDiv">
        <div id="q3Div" class="question">
            <h2>3. How would you say you looked better than someone else in a photograph?</h2>
            <select name="q3" class="userInput">
                <option value=""></option>
                <option value="Framemogged">Framemogged</option>
                <option value="Picturemogged">Picturemogged</option>
                <option value="I look better than you in that picture">I look better than you in that picture</option>
                <option value="Please stop asking me these questions">Please stop asking me these questions</option>
            </select>
            <br>
            <br>
        </div>
        <img id="q3DivPic" class="picture">
    </div>
    <div class="picDiv">
        <div id="q4Div" class="question">
            <h2>4. What is the most popular number right now?</h2>
            <input type="number" name="q4" min="0" max="68" class="userInput">
            <br>
            <br>
        </div>
        <img id="q4DivPic" class="picture">
    </div>
    <div class="picDiv">
        <div id="q5Div" class="question">
            <h2>5. Which Questions refer to Framemogging?</h2>
            <br>
            <div id="q5ChoicesDiv"></div>
            <br>
            <br>
        </div>
        <img id="q5DivPic" class="picture">
    </div>
    <button id="submitButton">Submit Quiz</button>

    <p id="score"></p>
    <p id="youWin"></p>
    <p id="attempts"></p>

</body>

</html>
